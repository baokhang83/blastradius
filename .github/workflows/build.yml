name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Maven 3.9.6 / JDK ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['21', '25']
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.6
      - run: mvn -B --no-transfer-progress clean verify
