name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Maven 3.9.6 / JDK 21
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.6
      - run: mvn -B --no-transfer-progress clean verify
