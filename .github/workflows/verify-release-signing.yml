name: Verify release signing

on:
  push:
    branches:
      - feature/prepare-the-0-1-0-maven-central-release

permissions:
  contents: read

jobs:
  sign:
    name: Sign release artifacts without publishing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.6
      - name: Import the release signing key
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        run: printf '%s' "$MAVEN_GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
      - name: Build and sign without publishing
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn -B --no-transfer-progress -Prelease clean verify -Dcentral.skip.publishing=true
